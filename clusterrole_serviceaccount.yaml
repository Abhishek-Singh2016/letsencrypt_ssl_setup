apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-manager-webhook-duckdns:flow-control-solver
rules:
  - apiGroups:
      - acme.webhook.duckdns.org
    resources:
      - '*'
    verbs:
      - 'create'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-webhook-duckdns:flow-control-solver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cert-manager-webhook-duckdns:flow-control-solver
subjects:
  - name: cert-manager
    namespace: cert-manager
    kind: ServiceAccount